name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r requirements.txt

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=migrations,venv,.venv \
            --ignore=E501,W503